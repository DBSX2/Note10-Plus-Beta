name: Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        model: [ "N975F" ]

    steps:
    - uses: actions/checkout@v1
    - name: Install mkbootimg
      run: |
        wget -q https://android.googlesource.com/platform/system/tools/mkbootimg/+archive/refs/heads/master.tar.gz -O - | tar xzf - mkbootimg.py
        chmod +x mkbootimg.py
        sudo mv mkbootimg.py /usr/local/bin/mkbootimg
    - name: Install avbtool
      run: |
        wget -q https://android.googlesource.com/platform/external/avb/+archive/refs/heads/android10-dev.tar.gz -O - | tar xzf - avbtool
        chmod +x avbtool
        sudo mv avbtool /usr/local/bin/avbtool
    - name: Clone Submodules
      run: git submodule update --init --recursive
    - name: Kernel Configure
      run: |
        ./build config                   \
                model=${{ matrix.model}} \
                name="CRUEL-V3.4"        \
                +magisk                  \
                +nohardening             \
                +ttl                     \
                +wireguard               \
                +cifs                    \
                +sdfat                   \
                +ntfs                    \
                +morosound               \
                +boeffla_wl_blocker      \
                +ts_config               \
        2>&1 | tee config.info
    - name: Kernel Build
      run: ./build :build
    - name: Create boot.img
      run: ./build :mkimg
    - name: Upload Kernel
      uses: actions/upload-artifact@v2
      with:
        name: ThunderStormsKernel-${{ matrix.model }}
        path: boot.img
    - name: Upload Kernel Info
      uses: actions/upload-artifact@v2
      with:
        name: ConfigurationInfo-${{ matrix.model }}
        path: config.*    - name: Kernel Configure (Direct make)
      run: |
        cd kernel
        make ARCH=arm64 exynos9820-d2s_defconfig
        ./scripts/config --enable CONFIG_RTL8812AU

    - name: Kernel Build (Direct make)
      run: |
        cd kernel
        make ARCH=arm64 -j$(nproc)

    - name: Create boot.img (Manual)
      run: |
        # 复制编译好的内核和 DTB
        cp kernel/arch/arm64/boot/Image.gz .
        cp kernel/arch/arm64/boot/dts/exynos/exynos9820-d2s.dtb .
        
        # 使用 mkbootimg 打包
        mkbootimg \
          --kernel Image.gz \
          --ramdisk /dev/null \
          --dtb exynos9820-d2s.dtb \
          --cmdline "androidboot.hardware=exynos9820 androidboot.selinux=permissive" \
          --base 0x10000000 \
          --pagesize 2048 \
          --os_version 11.0.0 \
          --os_patch_level 2023-12-01 \
          --output boot.img

    - name: Upload Kernel
      uses: actions/upload-artifact@v4
      with:
        name: ThunderStormsKernel-d2s
        path: boot.img
